<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - DisWebTienda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="public/css/variables.css" rel="stylesheet">
  <link href="public/css/estilos.css" rel="stylesheet">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand-primary) 0%, #334155 100%);
    }
    .login-card {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
    }
    .login-left {
      background: linear-gradient(135deg, var(--brand-primary) 0%, #334155 100%);
      color: white;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .login-right {
      padding: 3rem;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="row g-0">
        <!-- Panel izquierdo -->
        <div class="col-md-5 login-left d-none d-md-flex">
          <div>
            <h2 class="mb-4" style="font-family: 'Playfair Display', serif;">
              <i class="bi bi-book-half me-2"></i>DisWebTienda
            </h2>
            <p class="opacity-75">Accede a tu cuenta para comprar libros digitales y gestionar tus descargas.</p>
            <hr class="border-secondary">
            <p class="small opacity-50">¿No tienes cuenta? Regístrate para empezar a comprar.</p>
            <a href="index.html" class="btn btn-outline-light btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Volver al catálogo
            </a>
          </div>
        </div>

        <!-- Panel derecho - Formulario -->
        <div class="col-md-7 login-right">
          <h3 class="mb-4" style="font-family: 'Playfair Display', serif; color: var(--brand-primary);">
            Iniciar Sesión
          </h3>

          <!-- Alerta de error -->
          <div id="alert-error" class="alert alert-danger d-none" role="alert"></div>

          <form id="login-form">
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="login-email" placeholder="tu@email.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="login-password" placeholder="••••••••" required minlength="6">
                <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="remember-me">
              <label class="form-check-label" for="remember-me">Recordar mi sesión</label>
            </div>

            <button type="submit" class="btn w-100 mb-3" id="btn-submit" style="background-color: var(--accent-color); color: #fff;">
              <span id="btn-text">Iniciar Sesión</span>
              <span id="btn-spinner" class="d-none">
                <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
              </span>
            </button>
          </form>

          <hr>

          <!-- Selector de rol para pruebas -->
          <div class="text-center">
            <p class="text-muted small mb-2">Acceso rápido (solo para pruebas):</p>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <button class="btn btn-outline-success btn-sm btn-demo" data-rol="cliente">
                <i class="bi bi-person me-1"></i>Cliente
              </button>
              <button class="btn btn-outline-warning btn-sm btn-demo" data-rol="admin">
                <i class="bi bi-shield-check me-1"></i>Admin
              </button>
              <button class="btn btn-outline-info btn-sm btn-demo" data-rol="proveedor">
                <i class="bi bi-truck me-1"></i>Proveedor
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="public/js/config.js"></script>
  <script src="public/js/auth.js"></script>
</body>
</html>
